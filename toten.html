<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Toten</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}

    body{
      background:#2b57a7;
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      font-family: Inter, system-ui, -apple-system, Arial, sans-serif;
    }

    .stage{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .tela{
      width:1080px;
      height:1920px;
      position:relative;
      overflow:hidden;
      transform-origin:center;
      background:#2b57a7;
    }

    .bg{
      position:absolute;
      inset:0;
      background-image:url("./img/fundo.png");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      z-index:1;
    }

    .overlay{
      position:absolute;
      inset:0;
      z-index:2;
      color:#fff;
      padding: 520px 120px 470px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .texto-apoio{
      font-size: 52px;
      opacity: .95;
      margin-bottom: 14px;
      text-shadow: 0 6px 16px rgba(0,0,0,.25);
    }

    .titulo{
      font-family: Montserrat, Inter, Arial, sans-serif;
      font-size: 96px;
      font-weight: 900;
      line-height: 1.03;
      margin-bottom: 34px;
      text-shadow: 0 10px 20px rgba(0,0,0,.22);
    }

    .menu{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 34px;
      margin-top: 6px;
    }

    .botao{
      width: 980px;
      padding: 46px 28px;
      border-radius: 28px;
      text-decoration:none;

      font-family: Montserrat, Inter, Arial, sans-serif;
      font-size: 48px;
      font-weight: 800;
      letter-spacing: .8px;

      display:flex;
      align-items:center;
      justify-content:center;

      box-shadow: 0 10px 22px rgba(0,0,0,.18);
      transition: transform .06s ease;
    }
    .botao:active{ transform: scale(0.992); }

    .roxo{ background:#8f96ea; color:#ffffff; }
    .azul{ background:#d7e6ff; color:#003a7a; }

    /* BOTÃO REDONDO */
    #botaoFlutuante{
      position:fixed;
      bottom:40px;
      right:40px;
      width:85px;
      height:85px;
      border-radius:50%;
      border:none;
      background:#2b57a7;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
      box-shadow:0 8px 20px rgba(0,0,0,.3);
    }

    #botaoFlutuante .icone{
      font-size:35px;
      position:absolute;
    }

    #botaoFlutuante .texto{
      position:absolute;
      width:100%;
      height:100%;
      font-size:10px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #botaoFlutuante .texto span{
      position:absolute;
      left:50%;
      top:0;
      transform-origin: 50px;
    }

    #overlayFlutuante{
      position:fixed;
      inset:0;
      display:none;
      justify-content:center;
      align-items:center;
      z-index:9998;
      background: rgba(0,0,0,0.2);
    }

    .container-imagens{
      position:relative;
      width:100%;
      height:100%;
    }

    .img-base, .img-topo{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      max-width:100%;
      max-height:100%;
    }

    .img-topo{ z-index:2; }
    .img-base{ z-index:1; }

  </style>
</head>

<body>
  <div class="stage">
    <main class="tela" id="tela">
      <div class="bg" aria-hidden="true"></div>

      <section class="overlay">
        <p class="texto-apoio">Toque na opção desejada e</p>
        <h1 class="titulo">descubra mais:</h1>

        <nav class="menu">
          <a class="botao roxo" href="graduacoes.html">GRADUAÇÕES</a>
          <a class="botao azul" href="pos.html">PÓS-GRADUAÇÕES</a>

          <a class="botao roxo"
             href="https://www.senacrs.com.br/unisenac/8d0ded17-fd8e-4d8d-8b1c-cacbf8c65a36"
             target="_blank"
             rel="noopener noreferrer">
            CURSOS LIVRES
          </a>

          <a class="botao azul" href="cursos-gratuitos.html">CURSOS GRATUITOS</a>
          <a class="botao roxo" href="unidades.html">CONHEÇA AS UNIDADES</a>

<a class="botao azul" href="escola.html">
  ESCOLA SENAC
</a>
          </a>
        </nav>
      </section>
    </main>
  </div>

  <!-- BOTÃO -->
  <button id="botaoFlutuante">
    <span class="icone">🩸</span>
    <div class="texto" id="textoArco"></div>
  </button>

  <!-- OVERLAY -->
  <div id="overlayFlutuante">
    <div class="container-imagens">
      <img src="./img/imagem1.png" class="img-base">
      <img src="./img/imagem2.png" class="img-topo">
    </div>
  </div>

  <script>
    function fitToten(){
      const tela = document.getElementById('tela');
      const scale = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
      tela.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', fitToten);
    fitToten();

    const ATIVAR_BOTAO = true;

    const botao = document.getElementById("botaoFlutuante");
    const overlay = document.getElementById("overlayFlutuante");
    const imgBase = document.querySelector(".img-base");
    const imgTopo = document.querySelector(".img-topo");

    let etapa = 0;
    let intervalo;

    if (!ATIVAR_BOTAO) {
      botao.style.display = "none";
    }

    botao.addEventListener("click", () => {
      overlay.style.display = "flex";
      etapa = 1;
      imgBase.style.display = "block";
      imgTopo.style.display = "none";

      clearInterval(intervalo);
      intervalo = setInterval(() => {
        if (etapa === 1) {
          imgTopo.style.display = "block";
          etapa = 2;
        } else {
          imgTopo.style.display = "none";
          etapa = 1;
        }
      }, 3000);
    });

    overlay.addEventListener("click", () => {
      overlay.style.display = "none";
      etapa = 0;
      clearInterval(intervalo);
    });

    // TEXTO EM ARCO
    const texto = "DOE SANGUE";
    const containerTexto = document.getElementById("textoArco");

    texto.split("").forEach((letra, i) => {
      const span = document.createElement("span");
      span.innerText = letra;
      span.style.transform = `rotate(${i * 12}deg)`;
      containerTexto.appendChild(span);
    });
  </script>
</body>
</html>
